<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>KasirPintar - Android Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            color: #1a202c;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button, input {
            touch-action: manipulation;
            min-height: 44px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            color: white;
        }

        .tab-active {
            background-color: #4f46e5;
            color: white !important;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .page-transition {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #e2e8f0;
            z-index: 50;
        }
    </style>
</head>
<body class="pb-20">
    <div id="app" class="max-w-md mx-auto p-4">
        
        <!-- Setup Modal -->
        <div id="setup-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-white hidden">
            <div class="p-8 w-full text-center">
                <div class="w-20 h-20 bg-indigo-100 rounded-full mx-auto flex items-center justify-center mb-6">
                    <i data-lucide="store" class="text-indigo-600 w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-bold mb-2">KasirPintar</h2>
                <p class="text-gray-500 mb-8 italic" id="morning-quote"></p>
                <div class="space-y-6 text-left">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Pemilik/Toko</label>
                        <input type="text" id="username-input" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl outline-none" placeholder="Contoh: Toko Berkah">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Modal Awal Hari Ini (Rp)</label>
                        <input type="number" id="capital-input" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl outline-none" placeholder="0">
                    </div>
                    <button onclick="saveSetup()" class="w-full btn-primary py-4 rounded-2xl font-bold text-lg">Buka Toko</button>
                </div>
            </div>
        </div>

        <!-- Cash Payment Modal -->
        <div id="cash-modal" class="fixed inset-0 z-[110] flex items-end justify-center bg-black/60 backdrop-blur-sm hidden">
            <div class="bg-white p-6 w-full rounded-t-[2.5rem] page-transition">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                <h2 class="text-xl font-bold mb-4 text-center">Pembayaran Tunai</h2>
                <div class="space-y-4">
                    <div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center">
                        <span class="text-gray-500 font-medium">Total Tagihan</span>
                        <span class="text-2xl font-black text-indigo-600" id="cash-modal-total">Rp 0</span>
                    </div>
                    <div>
                        <input type="number" id="cash-received" oninput="calculateChange()" class="w-full text-3xl font-black px-4 py-5 bg-gray-50 border-2 border-indigo-100 rounded-2xl focus:border-indigo-500 outline-none text-center" placeholder="0">
                        <div class="flex gap-2 mt-3">
                            <button onclick="setUangPas()" class="flex-grow bg-indigo-50 text-indigo-600 py-3 rounded-xl font-bold">Uang Pas</button>
                            <button onclick="addNominal(50000)" class="px-4 bg-gray-100 rounded-xl font-bold text-sm">50rb</button>
                            <button onclick="addNominal(100000)" class="px-4 bg-gray-100 rounded-xl font-bold text-sm">100rb</button>
                        </div>
                    </div>
                    <div id="change-display" class="p-4 bg-emerald-50 rounded-2xl flex justify-between items-center hidden">
                        <span class="text-emerald-600 font-medium">Kembalian</span>
                        <span class="text-2xl font-black text-emerald-700" id="cash-change">Rp 0</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button onclick="closeCashModal()" class="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl font-bold">Batal</button>
                        <button id="btn-complete-cash" onclick="processCheckout('CASH')" disabled class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold opacity-50 shadow-lg">Selesai</button>
                    </div>
                </div>
            </div>
        </div>

        <header class="flex justify-between items-center mb-6 pt-2">
            <div>
                <h3 class="text-2xl font-extrabold text-indigo-900" id="display-name">Halo!</h3>
                <p class="text-xs text-gray-400 font-medium" id="current-date"></p>
            </div>
            <button onclick="confirmEndDay()" class="p-2 bg-red-50 text-red-500 rounded-full">
                <i data-lucide="power" class="w-6 h-6"></i>
            </button>
        </header>

        <main>
            <div id="tab-pos" class="tab-content page-transition">
                <div class="space-y-6">
                    <div class="flex gap-4 overflow-x-auto pb-2">
                        <div class="flex-shrink-0 bg-white p-4 rounded-2xl shadow-sm border border-gray-100 w-32">
                            <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Sales</p>
                            <p class="text-sm font-bold text-emerald-600" id="mini-sales">Rp 0</p>
                        </div>
                        <div class="flex-shrink-0 bg-white p-4 rounded-2xl shadow-sm border border-gray-100 w-32">
                            <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Kas</p>
                            <p class="text-sm font-bold text-indigo-600" id="mini-cash">Rp 0</p>
                        </div>
                    </div>
                    <div class="glass-card p-4">
                        <h2 class="text-sm font-bold text-gray-400 uppercase mb-4 tracking-wider">Produk Jualan</h2>
                        <div class="grid grid-cols-2 gap-3" id="product-grid"></div>
                    </div>
                    <div id="floating-cart" class="fixed bottom-24 left-4 right-4 bg-indigo-600 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden" onclick="toggleCartView()">
                        <div class="flex items-center gap-3">
                            <div class="bg-white/20 p-2 rounded-lg"><i data-lucide="shopping-bag" class="w-5 h-5"></i></div>
                            <div>
                                <p id="float-qty" class="text-xs font-bold">0 Item</p>
                                <p id="float-total" class="font-bold">Rp 0</p>
                            </div>
                        </div>
                        <span class="text-sm font-bold bg-white/20 px-3 py-1 rounded-full">Lihat <i data-lucide="chevron-up" class="inline w-4 h-4"></i></span>
                    </div>
                    <div id="cart-drawer" class="fixed inset-0 z-[105] bg-black/50 hidden">
                        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] p-6 max-h-[80vh] flex flex-col">
                            <div onclick="toggleCartView()" class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                            <h2 class="text-xl font-bold mb-4">Keranjang</h2>
                            <div class="flex-grow overflow-y-auto mb-6" id="cart-list"></div>
                            <div class="border-t pt-4 space-y-4">
                                <div class="flex justify-between items-center">
                                    <span class="text-gray-500 font-bold">Total</span>
                                    <span class="text-2xl font-black text-indigo-600" id="cart-total">Rp 0</span>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <button onclick="openCashModal()" class="bg-emerald-500 text-white py-4 rounded-2xl font-black">TUNAI</button>
                                    <button onclick="processCheckout('QRIS')" class="bg-blue-500 text-white py-4 rounded-2xl font-black">QRIS</button>
                                </div>
                                <button onclick="clearCart()" class="w-full text-red-400 font-bold text-sm">Kosongkan</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-inventory" class="tab-content hidden page-transition">
                <div class="glass-card p-5">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">Stok Produk</h2>
                        <button onclick="addNewProduct()" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold text-sm">+ Tambah</button>
                    </div>
                    <div class="space-y-3" id="inventory-list"></div>
                </div>
            </div>

            <div id="tab-report" class="tab-content hidden page-transition">
                <div class="space-y-4">
                    <div class="glass-card p-6 bg-gradient-to-br from-indigo-600 to-violet-700 text-white">
                        <p class="text-indigo-100 text-sm font-bold uppercase mb-1">Saldo Bersih</p>
                        <h2 class="text-3xl font-black" id="rep-net">Rp 0</h2>
                    </div>
                    <div class="glass-card p-5">
                        <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="minus-circle" class="text-red-500 w-4 h-4"></i> Catat Pengeluaran</h3>
                        <div class="space-y-3">
                            <input type="text" id="exp-desc" class="w-full px-4 py-3 bg-gray-50 rounded-xl text-sm" placeholder="Misal: Gas, Parkir">
                            <input type="number" id="exp-amount" class="w-full px-4 py-3 bg-gray-50 rounded-xl text-sm" placeholder="Jumlah (Rp)">
                            <button onclick="addExpense()" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold">Simpan</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-history" class="tab-content hidden page-transition">
                <div class="space-y-4" id="history-list"></div>
            </div>
        </main>

        <div class="bottom-nav">
            <button onclick="switchTab('pos')" id="btn-pos" class="flex flex-col items-center text-gray-400"><i data-lucide="shopping-cart" class="w-6 h-6"></i><span class="text-[10px] mt-1 font-bold">Kasir</span></button>
            <button onclick="switchTab('inventory')" id="btn-inventory" class="flex flex-col items-center text-gray-400"><i data-lucide="package" class="w-6 h-6"></i><span class="text-[10px] mt-1 font-bold">Produk</span></button>
            <button onclick="switchTab('report')" id="btn-report" class="flex flex-col items-center text-gray-400"><i data-lucide="pie-chart" class="w-6 h-6"></i><span class="text-[10px] mt-1 font-bold">Laporan</span></button>
            <button onclick="switchTab('history')" id="btn-history" class="flex flex-col items-center text-gray-400"><i data-lucide="history" class="w-6 h-6"></i><span class="text-[10px] mt-1 font-bold">Riwayat</span></button>
        </div>

        <!-- End Day Summary Modal -->
        <div id="summary-modal" class="fixed inset-0 z-[150] flex items-center justify-center bg-black/80 backdrop-blur-md hidden">
            <div class="bg-white p-8 w-full h-full flex flex-col justify-center text-center">
                <div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full mx-auto flex items-center justify-center mb-6">
                    <i data-lucide="award" class="w-12 h-12"></i>
                </div>
                <h2 class="text-3xl font-black mb-8">Tutup Toko</h2>
                <div class="bg-gray-50 rounded-[2rem] p-8 mb-10 text-left space-y-4">
                    <div class="flex justify-between items-center"><span>Omzet Tunai</span><span id="sum-cash" class="font-bold"></span></div>
                    <div class="flex justify-between items-center"><span>Omzet QRIS</span><span id="sum-qris" class="font-bold"></span></div>
                    <div class="flex justify-between items-center text-red-400"><span>Keluar</span><span id="sum-exp" class="font-bold"></span></div>
                    <div class="border-t pt-4 mt-4 flex justify-between items-center"><span class="font-bold">Saldo Akhir</span><span id="sum-final" class="text-2xl font-black text-indigo-600"></span></div>
                </div>
                <button onclick="executeEndDay()" class="w-full btn-primary py-5 rounded-2xl font-black text-lg">Simpan & Reset</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            user: { name: '', capital: 0 },
            products: [], cart: [], transactions: [], expenses: [],
            dailyArchive: JSON.parse(localStorage.getItem('dailyArchive_v3') || '[]'),
            currentDate: new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' })
        };

        const morningQuotes = ["Semoga laris manis hari ini!", "Bismillah, rezeki berkah.", "Ayo buat pelanggan bahagia!"];

        function initIcons() { if (typeof lucide !== 'undefined') lucide.createIcons(); }

        window.onload = () => {
            loadProducts();
            checkSession();
            renderAll();
            switchTab('pos');
            initIcons();
        };

        function loadProducts() {
            const saved = localStorage.getItem('pos_products_v3');
            state.products = saved ? JSON.parse(saved) : [{ id: 1, name: 'Kopi Susu', price: 15000 }, { id: 2, name: 'Roti Bakar', price: 12000 }];
            if(!saved) saveProducts();
        }

        function saveProducts() { localStorage.setItem('pos_products_v3', JSON.stringify(state.products)); }

        function checkSession() {
            const savedSession = localStorage.getItem('pos_current_session_v3');
            if (!savedSession) {
                document.getElementById('setup-modal').classList.remove('hidden');
                document.getElementById('morning-quote').innerText = morningQuotes[Math.floor(Math.random() * morningQuotes.length)];
            } else {
                state.user = JSON.parse(savedSession);
                state.transactions = JSON.parse(localStorage.getItem('pos_trans_v3') || '[]');
                state.expenses = JSON.parse(localStorage.getItem('pos_exp_v3') || '[]');
                document.getElementById('display-name').innerText = state.user.name;
                updateStats();
            }
            document.getElementById('current-date').innerText = state.currentDate;
        }

        function saveSetup() {
            const name = document.getElementById('username-input').value;
            const capital = parseInt(document.getElementById('capital-input').value) || 0;
            if (!name) return;
            state.user = { name, capital };
            localStorage.setItem('pos_current_session_v3', JSON.stringify(state.user));
            document.getElementById('setup-modal').classList.add('hidden');
            document.getElementById('display-name').innerText = name;
            updateStats();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`btn-${tabId}`).classList.add('tab-active');
            initIcons();
        }

        function toggleCartView() { document.getElementById('cart-drawer').classList.toggle('hidden'); }

        function addToCart(id) {
            const p = state.products.find(x => x.id === id);
            const inCart = state.cart.find(x => x.id === id);
            if (inCart) inCart.qty++;
            else state.cart.push({ ...p, qty: 1 });
            renderCart();
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const total = state.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const qtyTotal = state.cart.reduce((s, i) => s + i.qty, 0);

            if (state.cart.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-300 font-bold">Kosong</div>`;
                document.getElementById('floating-cart').classList.add('hidden');
            } else {
                list.innerHTML = state.cart.map(item => `
                    <div class="flex justify-between items-center mb-4 p-4 bg-gray-50 rounded-2xl">
                        <div><p class="font-bold text-sm">${item.name}</p><p class="text-[10px] text-indigo-500 font-bold">${item.qty}x @ Rp ${item.price.toLocaleString()}</p></div>
                        <div class="flex items-center gap-3"><p class="font-black text-sm">Rp ${(item.qty * item.price).toLocaleString()}</p><button onclick="removeFromCart(${item.id})" class="text-red-400"><i data-lucide="x-circle" class="w-4 h-4"></i></button></div>
                    </div>
                `).join('');
                document.getElementById('floating-cart').classList.remove('hidden');
            }
            document.getElementById('cart-total').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('float-total').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('float-qty').innerText = `${qtyTotal} Item`;
            initIcons();
        }

        function removeFromCart(id) { state.cart = state.cart.filter(i => i.id !== id); renderCart(); }
        function clearCart() { state.cart = []; renderCart(); }

        function openCashModal() {
            const total = state.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cash-modal-total').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('cash-received').value = '';
            document.getElementById('change-display').classList.add('hidden');
            document.getElementById('btn-complete-cash').disabled = true;
            document.getElementById('cash-modal').classList.remove('hidden');
            document.getElementById('cart-drawer').classList.add('hidden');
        }

        function closeCashModal() { document.getElementById('cash-modal').classList.add('hidden'); }
        function setUangPas() { 
            const total = state.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cash-received').value = total;
            calculateChange();
        }
        function addNominal(val) {
            const current = parseInt(document.getElementById('cash-received').value) || 0;
            document.getElementById('cash-received').value = current + val;
            calculateChange();
        }

        function calculateChange() {
            const total = state.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const received = parseInt(document.getElementById('cash-received').value) || 0;
            const change = received - total;
            const btn = document.getElementById('btn-complete-cash');

            if (received >= total && total > 0) {
                document.getElementById('change-display').classList.remove('hidden');
                document.getElementById('cash-change').innerText = `Rp ${change.toLocaleString()}`;
                btn.disabled = false; btn.classList.remove('opacity-50');
            } else {
                document.getElementById('change-display').classList.add('hidden');
                btn.disabled = true; btn.classList.add('opacity-50');
            }
        }

        function processCheckout(method) {
            const total = state.cart.reduce((s, i) => s + (i.price * i.qty), 0);
            state.transactions.push({ id: Date.now(), time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }), method, total, items: state.cart.map(i => `${i.qty}x ${i.name}`).join(', ') });
            localStorage.setItem('pos_trans_v3', JSON.stringify(state.transactions));
            state.cart = [];
            closeCashModal();
            renderAll();
        }

        function addNewProduct() { state.products.push({ id: Date.now(), name: 'Barang Baru', price: 0 }); saveProducts(); renderAll(); }
        function updateProduct(id, field, value) { 
            const p = state.products.find(x => x.id === id);
            p[field] = field === 'price' ? parseInt(value) || 0 : value;
            saveProducts(); renderProducts(); 
        }
        function removeProduct(id) { state.products = state.products.filter(p => p.id !== id); saveProducts(); renderAll(); }

        function addExpense() {
            const desc = document.getElementById('exp-desc').value;
            const amount = parseInt(document.getElementById('exp-amount').value);
            if (!desc || !amount) return;
            state.expenses.push({ id: Date.now(), desc, amount });
            localStorage.setItem('pos_exp_v3', JSON.stringify(state.expenses));
            document.getElementById('exp-desc').value = ''; document.getElementById('exp-amount').value = '';
            updateStats(); renderAll();
        }

        function renderAll() { renderProducts(); renderInventory(); renderHistory(); renderCart(); updateStats(); }

        function renderProducts() {
            document.getElementById('product-grid').innerHTML = state.products.map(p => `
                <button onclick="addToCart(${p.id})" class="p-4 bg-gray-50 border border-gray-100 rounded-2xl text-left active:scale-95 transition-all">
                    <p class="font-bold text-gray-800 truncate text-xs mb-1">${p.name}</p>
                    <p class="text-indigo-600 font-black text-[10px]">Rp ${p.price.toLocaleString()}</p>
                </button>
            `).join('');
        }

        function renderInventory() {
            document.getElementById('inventory-list').innerHTML = state.products.map(p => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-2xl">
                    <div class="flex-grow">
                        <input type="text" onchange="updateProduct(${p.id}, 'name', this.value)" value="${p.name}" class="w-full bg-transparent font-bold text-sm outline-none">
                        <input type="number" onchange="updateProduct(${p.id}, 'price', this.value)" value="${p.price}" class="w-full bg-transparent text-xs text-indigo-500 font-bold outline-none">
                    </div>
                    <button onclick="removeProduct(${p.id})" class="p-2 text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            initIcons();
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = state.transactions.slice().reverse().map(t => `
                <div class="p-4 bg-white rounded-2xl flex justify-between items-center shadow-sm">
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">${t.time} • ${t.method}</p><p class="text-xs font-bold text-gray-700 truncate max-w-[200px]">${t.items}</p></div>
                    <p class="font-black text-indigo-600 text-sm">Rp ${t.total.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function updateStats() {
            const sales = state.transactions.reduce((s, t) => s + t.total, 0);
            const exps = state.expenses.reduce((s, e) => s + e.amount, 0);
            const net = state.user.capital + sales - exps;
            document.getElementById('rep-net').innerText = `Rp ${net.toLocaleString()}`;
            document.getElementById('mini-sales').innerText = `Rp ${sales.toLocaleString()}`;
            document.getElementById('mini-cash').innerText = `Rp ${net.toLocaleString()}`;
        }

        function confirmEndDay() {
            const cash = state.transactions.filter(t => t.method === 'CASH').reduce((s, t) => s + t.total, 0);
            const qris = state.transactions.filter(t => t.method === 'QRIS').reduce((s, t) => s + t.total, 0);
            const exp = state.expenses.reduce((s, e) => s + e.amount, 0);
            document.getElementById('sum-cash').innerText = `Rp ${cash.toLocaleString()}`;
            document.getElementById('sum-qris').innerText = `Rp ${qris.toLocaleString()}`;
            document.getElementById('sum-exp').innerText = `Rp ${exp.toLocaleString()}`;
            document.getElementById('sum-final').innerText = `Rp ${(state.user.capital + cash + qris - exp).toLocaleString()}`;
            document.getElementById('summary-modal').classList.remove('hidden');
        }

        function executeEndDay() {
            const sales = state.transactions.reduce((s, t) => s + t.total, 0);
            const exps = state.expenses.reduce((s, e) => s + e.amount, 0);
            state.dailyArchive.push({ date: state.currentDate, sales, expenses: exps, net: (state.user.capital + sales - exps) });
            localStorage.setItem('dailyArchive_v3', JSON.stringify(state.dailyArchive));
            localStorage.removeItem('pos_current_session_v3');
            localStorage.removeItem('pos_trans_v3');
            localStorage.removeItem('pos_exp_v3');
            location.reload();
        }

        // Registrasi Service Worker PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Siap!', reg))
                    .catch(err => console.log('Gagal!', err));
            });
        }
    </script>
    
</body>
</html>
